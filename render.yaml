services:
  - type: web
    name: sports-master-schedule
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Bind to the port Render injects via $PORT.
    # 2 workers × 4 threads keeps the in-memory cache usable across
    # requests (one dict per worker) while handling parallelism.
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60 "app:create_app()"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      # SCHEDULE_TOKEN: set in the Render dashboard to a long random
      # string. When set, POST endpoints (watched / notes) require a
      # matching cookie, which the dashboard installs when you visit
      # /?token=<value> once. Reads stay public. Leave unset for local
      # dev or if the URL is already behind auth (Cloudflare Access etc).
      #
      # DATA_DIR: directory where userdata.json lives. Defaults to
      # ./data. On Render's free tier the filesystem is ephemeral so
      # watched flags and notes reset on every restart. To persist them,
      # add a Disk (Starter plan + $1/mo for 1GB) and set DATA_DIR to
      # the mount path, e.g. /var/data.
    autoDeploy: true

    # Uncomment when you've upgraded past the free tier and want
    # persistent userdata. The code already honors DATA_DIR above.
    # disk:
    #   name: data
    #   mountPath: /var/data
    #   sizeGB: 1
