<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover lets us paint behind the notch / dynamic island -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f1319">
    <meta name="color-scheme" content="dark">
    <!-- iOS standalone app (Add to Home Screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Sports Sched">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Sports Schedule</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23d4a332'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.svg">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- ── Header bar ───────────────────────────────────────────── -->
    <header>
        <div class="brand">SPORTS SCHEDULE</div>
        <div class="week-nav">
            <button id="btn-prev" class="nav-arrow" aria-label="Previous month">&lsaquo;</button>
            <span id="week-label">This Month</span>
            <button id="btn-next" class="nav-arrow" aria-label="Next month">&rsaquo;</button>
        </div>
        <button id="btn-refresh" class="refresh-btn">
            <svg class="refresh-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2.5 8a5.5 5.5 0 0 1 9.3-4M13.5 8a5.5 5.5 0 0 1-9.3 4"/><path d="M11.5 1v3h3M4.5 15v-3h-3"/></svg>
            Refresh
        </button>
    </header>
    <div class="header-accent"></div>

    <!-- ── Today summary strip (banner across all views) ────────── -->
    <div id="today-strip" class="today-strip hidden" role="button" tabindex="0">
        <span class="ts-label">TODAY</span>
        <span id="ts-content" class="ts-content"></span>
        <span class="ts-cta">View &rsaquo;</span>
    </div>

    <!-- ── Tab bar ──────────────────────────────────────────────── -->
    <nav class="tab-bar">
        <div class="view-tabs" role="tablist">
            <button class="tab active" data-view="week" aria-current="page">Calendar</button>
            <button class="tab" data-view="today">Today</button>
            <button class="tab tab-playoffs" data-view="playoffs">
                <span class="tab-trophy" aria-hidden="true">&#9782;</span>
                Playoffs
            </button>
            <button class="tab" data-view="tables">Tables</button>
        </div>
        <div class="sport-filters" role="group" aria-label="Filter by sport">
            <button class="pill active" data-sport="all" aria-pressed="true">All</button>
            <button class="pill" data-sport="soccer" aria-pressed="false"><span class="pill-dot soccer" aria-hidden="true"></span>Soccer</button>
            <button class="pill" data-sport="basketball" aria-pressed="false"><span class="pill-dot basketball" aria-hidden="true"></span>NBA</button>
            <button class="pill" data-sport="football" aria-pressed="false"><span class="pill-dot football" aria-hidden="true"></span>NFL</button>
        </div>
    </nav>

    <!-- ── Main content ─────────────────────────────────────────── -->
    <main>
        <div id="week-view">
            <div class="calendar-grid" id="calendar-grid"></div>
            <div class="detail-panel" id="detail-panel"></div>
        </div>
        <div id="today-view" class="hidden"></div>
        <div id="playoffs-view" class="hidden"></div>
        <div id="tables-view" class="hidden"></div>
        <div id="status-message" class="status-message"></div>
    </main>

    <!-- ── Footer ───────────────────────────────────────────────── -->
    <footer>
        <div class="legend">
            <span class="legend-item"><span class="ldot must-watch"></span>Must Watch</span>
            <span class="legend-item"><span class="ldot notable"></span>Notable</span>
            <span class="legend-item"><span class="ldot major-event"></span>Major Event</span>
            <span class="lsep"></span>
            <span class="legend-item"><span class="ldot can-watch"></span>Can Watch</span>
            <span class="legend-item"><span class="ldot will-miss"></span>Will Miss</span>
        </div>
        <p class="footnote">Powered by ESPN public data</p>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
